name: 刷步数

on:
  schedule:
    # 周一至周四：UTC 0-4点 和 7-13点（对应北京时间 8-12点 和 15-21点）
    - cron: '0 0-4,7-13 * * 1-4'
    # 周五：UTC 0点, 4点, 7-13点（对应北京时间 8点, 12点, 15-21点）
    - cron: '0 0,4,7-13 * * 5'
    # 周六：同周一至周四
    - cron: '0 0-4,7-13 * * 6'
    # 周日：同周一至周四
    - cron: '0 0-4,7-13 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"|| echo "No changes to commit"
          git push origin master