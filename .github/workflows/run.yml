name: 刷步数

on:
  schedule:
    # 周一至周四：UTC 0-4点 和 7-13点（对应北京时间 8-12点 和 15-21点）
    - cron: '14 0-4,7-13 * * 1-4'
    # 周五：UTC 0点, 4点, 7-13点（对应北京时间 8点, 12点, 15-21点）
    - cron: '14 0,4,7-13 * * 5'
    # 周六：同周一至周四
    - cron: '14 0-4,7-13 * * 6'
    # 周日：同周一至周四
    - cron: '14 0-4,7-13 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}

      - name: 初始化 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: 安装依赖 & 执行刷步数
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          python3 main.py

      - name: 随机化下一次触发的分钟并提交
        run: |
          # 生成随机分钟（0-59）
          RANDOM_MIN=$((RANDOM % 60))

          # 用 sed 替换所有 cron 行的分钟（注意匹配格式）
          sed -i "s/- cron: '[0-9]\+ /- cron: '$RANDOM_MIN /g" .github/workflows/run.yml

          # 提交更改
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .github/workflows/run.yml
          git commit -m "randomize cron minute to $RANDOM_MIN" || echo "No changes"
          git push origin master